    <style>
        /* 页面特定样式 */
        body {
            overflow-x: hidden;
            background-color: #05070a;
            color: #fff;
        }

        .roll-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 2rem;
            position: relative;
            z-index: 1;
        }

        /* 顶部 Tab */
        .world-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .world-tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: rgba(255, 255, 255, 0.7);
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', serif;
        }

        .world-tab-btn.active, .world-tab-btn:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: #FFD700;
            color: #FFD700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        /* 维度切换区 */
        .dimension-switcher {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1rem;
            width: 100%;
            max-width: 600px;
        }

        .nav-arrow {
            font-size: 1.5rem;
            color: #FFD700;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            transition: transform 0.2s;
            background: none;
            border: none;
        }

        .nav-arrow:hover {
            transform: scale(1.2);
        }

        .dimension-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            min-width: 200px;
            text-align: center;
        }

        /* 核心转盘区 */
        .wheel-wrapper {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 5rem auto 2rem;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            z-index: 10;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
        }
        
        .pointer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 40px solid #FFD700;
        }

        .wheel-container {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1), inset 0 0 50px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1); /* 默认阻尼动画 */
            background: radial-gradient(circle, #1a1a2e 0%, #000 100%);
        }

        /* 扇区样式 */
        .sector {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 50%;
            transform-origin: 0% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 边框用于辅助看清扇区 */
            /* border: 1px solid rgba(255, 255, 255, 0.1); */
        }

        .sector-text {
            position: absolute;
            left: 20px; /* 距离圆心的距离 */
            bottom: 5px; /* 微调垂直位置 */
            transform-origin: 0 50%;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
            font-weight: 500;
            text-shadow: 1px 1px 2px black;
            width: 140px; /* 限制文字长度 */
            text-align: left;
        }

        /* 实时结果显示 */
        .result-display {
            margin-top: -235px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            text-align: center;
            pointer-events: none;
        }

        .result-box {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #FFD700;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: #FFD700;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(4px);
            min-width: 150px;
            display: inline-block;
        }

        /* 底部功能区 */
        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }

        .btn-spin {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 1.2rem;
            background: radial-gradient(circle, #FFD700 0%, #b8860b 100%);
            border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            color: #000;
            font-weight: 900;
            transition: transform 0.1s;
        }

        .btn-spin:active {
            transform: scale(0.95);
        }

        .results-log {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);

            font-size: 0.9rem;
        }
        
        .log-label { color: #aaa; }
        .log-value { color: #FFD700; font-weight: bold; }



        /* 移动端适配 */
        @media (max-width: 576px) {
            .wheel-wrapper { width: 300px; height: 300px; }
            .sector-text { font-size: 12px; width: 120px; }
        }
    </style>

                "种族/物种": ["人类", "精灵", "矮人", "半身人", "提夫林", "龙裔"],
                "社会阶层": ["贵族", "行会成员", "罪犯", "平民", "隐士"],
                "外在性格": ["忠诚", "贪婪", "鲁莽", "睿智", "狡诈"],

        /**
         * ------------------------------------------------------------------
         * 全局状态管理 (State Management)
         * 变量名：activeWorld, activeDimension, wheelRotation, currentResult
         * ------------------------------------------------------------------
         */
        let activeWorld = "现世绘";
        let dimensionKeys = Object.keys(destinyPool[activeWorld]);
        let activeDimensionIndex = 0;
        let activeDimension = dimensionKeys[activeDimensionIndex];
        
        let wheelRotation = 0; // 当前转盘的旋转角度
        let isSpinning = false;
        let selectedResults = {}; // 存储所有维度的抽取结果 { "身份": "黑客", ... }

        // DOM 元素引用
        const wheelEl = document.getElementById('wheel');
        const pointerEl = document.getElementById('pointer');
        const resultTextEl = document.getElementById('resultText');
        const dimensionTitleEl = document.getElementById('dimensionTitle');
        const resultsLogEl = document.getElementById('resultsLog');

        /**
         * ------------------------------------------------------------------
         * 初始化与事件监听 (Initialization & Event Listeners)
         * ------------------------------------------------------------------
         */
        document.addEventListener('DOMContentLoaded', () => {
            initWheel();
            updateLogDisplay();

            // Tab 切换
            document.querySelectorAll('.world-tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {

                    activeWorld = e.target.dataset.world;
                    
                    // 重置维度索引，因为不同世界可能有不同维度结构（虽然目前demo结构相似）
                    dimensionKeys = Object.keys(destinyPool[activeWorld]);
                    activeDimensionIndex = 0;
                    activeDimension = dimensionKeys[activeDimensionIndex];
                    
                    // 清空当前世界的结果记录? 或者保留? 这里选择保留如果是同一维度
                    // 简单起见，切换世界重置结果显示
                    selectedResults = {}; 
                    
                    initWheel();
                    updateLogDisplay();
                });
            });

            // 维度切换
            document.getElementById('prevDim').addEventListener('click', () => switchDimension(-1));
            document.getElementById('nextDim').addEventListener('click', () => switchDimension(1));

            // 旋转按钮
            document.getElementById('spinBtn').addEventListener('click', spinWheel);
            // 点击转盘也可以旋转
            wheelEl.addEventListener('click', spinWheel);

            // 保存按钮
            document.getElementById('saveBtn').addEventListener('click', saveAndCopy);
        });

        function switchDimension(direction) {
            if (isSpinning) return;
            activeDimensionIndex += direction;
            if (activeDimensionIndex < 0) activeDimensionIndex = dimensionKeys.length - 1;
            if (activeDimensionIndex >= dimensionKeys.length) activeDimensionIndex = 0;
            
            activeDimension = dimensionKeys[activeDimensionIndex];
            initWheel(); // 重绘转盘
        }

        /**
         * ------------------------------------------------------------------
         * 核心功能：转盘绘制 (Rendering)
         * ------------------------------------------------------------------
         */
        function initWheel() {
            // 更新标题
            dimensionTitleEl.textContent = `当前抽取：${activeDimension}`;
            
            // 获取当前维度的选项
            const options = destinyPool[activeWorld][activeDimension] || [];
            const count = options.length;
            const sectorAngle = 360 / count;

            // 清空转盘
            wheelEl.innerHTML = '';
            wheelEl.style.transition = 'none'; // 移除动画以便瞬间重置
            wheelEl.style.transform = `rotate(${wheelRotation % 360}deg)`; // 保持当前视觉角度（或者重置为0）
            
            // 为了视觉效果，切换维度时通常重置旋转? 或者保持?
            // 为了平滑过渡，我们让它看起来是同一个盘在变。
            // 但因为扇区数量变了，最好有一个“重组”动画。
            // 这里简单处理：先重置 CSS 动画，再生成扇区。
            
            // 生成扇区
            options.forEach((text, i) => {
                const sector = document.createElement('div');
                sector.className = 'sector';
                // 旋转扇区容器，使其对应正确角度
                // 注意：扇区默认从 12 点钟方向开始（如果 transform-origin 是 bottom center）
                // 这里的 CSS .sector transform-origin 是 0% 100% (左下角?) 
                // 我们需要一个更稳健的画法。
                // 使用 conic-gradient 可能是个办法，但要在里面放文字比较难。
                // 采用绝对定位 + 旋转的方法。
                
                // 为了让文字居中，我们让每个 sector 占满圆，然后旋转
                // 并利用 clip-path 或 overflow hidden? 
                // 简单方案：不裁切形状，只定位文字。因为背景是统一的。
                // 我们需要在转盘上画分割线。
                
                // **扇区坐标计算与文字排版**
                // 角度：i * sectorAngle
                // 为了让文字在扇区中间，需要旋转 i * sectorAngle + sectorAngle / 2
                // 指针在 Top (0deg/360deg 处，对应 CSS 的 -90deg 或 270deg，取决于坐标系)
                // 假设 CSS 0deg 指向 12点钟。
                
                const angle = i * sectorAngle;
                const midAngle = angle + sectorAngle / 2;
                
                // 分割线 (可选)
                const line = document.createElement('div');
                line.style.position = 'absolute';
                line.style.top = '0';
                line.style.left = '50%';
                line.style.height = '50%';
                line.style.width = '1px';
                line.style.background = 'rgba(255, 215, 0, 0.3)';
                line.style.transformOrigin = 'bottom center';
                line.style.transform = `rotate(${angle}deg)`;
                wheelEl.appendChild(line);

                // 文字
                const label = document.createElement('div');
                label.className = 'sector-text';
                label.textContent = text;
                // 旋转文字容器
                // 这里的逻辑：容器以圆心为基点旋转到 midAngle
                // 文字本身可能需要微调
                // CSS .sector-text 已经在左侧定位，我们需要把它放到圆心，然后旋转并推出去
                
                label.style.top = '50%';
                label.style.left = '50%';
                label.style.width = '150px'; // 半径长度
                label.style.height = '20px';
                label.style.textAlign = 'right'; // 文字靠外侧
                label.style.transformOrigin = 'left center'; // 以圆心(左侧)为轴
                // 修正角度：CSS 0deg 是 3点钟方向 (默认)。我们需要让它指向 12点钟
                // 所以减去 90度。
                label.style.transform = `translateY(-50%) rotate(${midAngle - 90}deg)`;
                
                // 优化：文字应该正向阅读。如果角度 > 90 && < 270，文字会倒着。
                // 这种转盘通常文字都是径向排列的，倒着也正常。
                
                wheelEl.appendChild(label);
            });

            // 更新当前指向的结果 (基于当前 wheelRotation)
            updateResultFromRotation(wheelRotation);

        /**
         * ------------------------------------------------------------------

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            const spinBtn = document.getElementById('spinBtn');
            spinBtn.disabled = true;

            const options = destinyPool[activeWorld][activeDimension];
            const count = options.length;
            const sectorAngle = 360 / count;

            const targetIndex = Math.floor(Math.random() * count);

            const extraSpins = 360 * (4 + Math.floor(Math.random() * 3));

            let currentNorm = wheelRotation % 360;
            if (currentNorm < 0) currentNorm += 360;

            const targetMidAngle = targetIndex * sectorAngle + sectorAngle / 2;
            let targetNorm = (-targetMidAngle) % 360;
            if (targetNorm < 0) targetNorm += 360;

            let delta = targetNorm - currentNorm;
            if (delta < 0) delta += 360;

            const totalRotation = extraSpins + delta;
            const startRotation = wheelRotation;
            const endRotation = wheelRotation + totalRotation;

            wheelRotation = endRotation;

            wheelEl.style.transition = 'transform 4s cubic-bezier(0.15, 0, 0.2, 1)';
            wheelEl.style.transform = `rotate(${endRotation}deg)`;

            const startTime = performance.now();
            const duration = 4000;

            function updateDuringSpin(now) {
                if (!isSpinning) return;

                const elapsed = now - startTime;
                const t = Math.min(elapsed / duration, 1);
                const currentRotation = startRotation + totalRotation * t;

                updateResultFromRotation(currentRotation);

                if (t < 1 && isSpinning) {
                    requestAnimationFrame(updateDuringSpin);
                }
            }

            requestAnimationFrame(updateDuringSpin);

            setTimeout(() => {
                isSpinning = false;
                wheelEl.style.transition = 'none';

                const finalResult = options[targetIndex];
                resultTextEl.textContent = finalResult;
                selectedResults[activeDimension] = finalResult;
                updateLogDisplay();

                spinBtn.disabled = false;
            }, duration);
        }

        function updateResultFromRotation(rotation) {
            const options = destinyPool[activeWorld][activeDimension];
            const count = options.length;
            const sectorAngle = 360 / count;
            
            let angle = (-rotation) % 360;
            if (angle < 0) angle += 360;
            
            let index = Math.floor(angle / sectorAngle);
            if (index < 0) index = 0;
            if (index >= count) index = count - 1;
            const result = options[index] || options[0];
            resultTextEl.textContent = result;
            return result;
        }

        function updateLogDisplay() {
            resultsLogEl.innerHTML = '';
            const keys = Object.keys(selectedResults);
            if (keys.length === 0) {
                resultsLogEl.innerHTML = '<div class="text-center text-muted">暂无抽取记录</div>';
                return;
            }
            
            keys.forEach(key => {
                const item = document.createElement('div');
                item.className = 'log-item';
                item.innerHTML = `<span class="log-label">${key}</span><span class="log-value">${selectedResults[key]}</span>`;
                resultsLogEl.appendChild(item);
            });
        }

        function saveAndCopy() {
            const keys = Object.keys(selectedResults);
            if (keys.length === 0) {
                alert('请先抽取至少一项属性！');
                return;
            }
            
            let text = `【${activeWorld} · 角色设定】\n`;
            text += `-------------------------\n`;
            keys.forEach(key => {
                text += `${key}：${selectedResults[key]}\n`;
            });
            text += `-------------------------\n`;
            text += `生成于 流金梦坊 · 星盘系统`;
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('saveBtn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check me-2"></i>已复制！';
                btn.classList.replace('btn-primary', 'btn-success');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('btn-success', 'btn-primary');
                }, 2000);
            });
        }

    </script>
</body>
</html>
