<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>卧室 · 流金梦坊</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
</head>
<body data-page="profile">
  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="../index.html">流金梦坊</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html">大厅</a></li>
          <li class="nav-item"><a class="nav-link" href="workshop.html">织梦所</a></li>
          <li class="nav-item"><a class="nav-link" href="roll.html">占卜室</a></li>
          <li class="nav-item"><a class="nav-link active" href="profile.html">卧室</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="flowing-gold-line"></div>

  <main class="container my-4">
    <!-- 个人信息卡片 -->
    <div class="card mb-4 border-0 shadow-sm text-dark" style="background: linear-gradient(135deg, #FFD700 0%, #FFC107 100%);">
      <div class="card-body p-4">
        <div class="d-flex align-items-center">
          <div class="position-relative me-4" style="cursor: pointer;" onclick="document.getElementById('userAvatarInput').click()">
             <img id="userAvatar" src="https://placehold.co/150?text=User" class="rounded-circle border border-3 border-white shadow" style="width: 100px; height: 100px; object-fit: cover;">
             <div class="position-absolute bottom-0 end-0 bg-white rounded-circle p-1 shadow-sm text-dark d-flex justify-content-center align-items-center" style="width: 32px; height: 32px;">
               <i class="bi bi-camera-fill small"></i>
             </div>
             <input type="file" id="userAvatarInput" class="d-none" accept="image/*">
          </div>
          <div class="flex-grow-1">
            <div class="d-flex align-items-center gap-2">
              <h2 id="userNickname" class="h4 fw-bold mb-0">未命名用户</h2>
              <button class="btn btn-sm btn-outline-dark border-0" onclick="editNickname()">
                <i class="bi bi-pencil-fill"></i>
              </button>
            </div>
            <p id="userName" class="mb-0 opacity-75 small">@username</p>
          </div>
          <div class="align-self-start">
             <button class="btn btn-light text-danger fw-bold rounded-pill px-4 shadow-sm" onclick="logout()">
               <i class="bi bi-box-arrow-right me-2"></i>退出账号
             </button>
          </div>
        </div>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-header">我的 OC 库</div>
      <div class="card-body">
        <div id="myOcGrid" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3"></div>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-header">故事集</div>
      <div class="card-body">
        <div id="myStoryGrid" class="row row-cols-1 row-cols-md-2 g-3"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">联动申请审批</div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead><tr><th>申请方</th><th>目标OC</th><th>时间</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="reqTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
