<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地转偏向力与大气环流演变模型</title>
    <style>
        /* 全局样式 - 蓝白配色体系 */
        :root {
            --bg-dark: #F8FAFC;
            --bg-panel: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --accent-blue: #3B82F6;
            --accent-light: #2563EB;
            --accent-cyan: #0284C7;
            --border-color: rgba(59, 130, 246, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左侧控制面板 */
        .sidebar {
            width: 320px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        h1 {
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 600;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* 滑动条容器 */
        .control-group {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .control-label {
            font-size: 14px;
            font-weight: bold;
            color: var(--accent-light);
        }

        .control-value {
            font-size: 14px;
            font-family: monospace;
            background: var(--accent-blue);
            padding: 2px 8px;
            border-radius: 4px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #3B82F6;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        /* 状态显示面板 */
        .status-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .status-box {
            padding: 16px;
            border-radius: 8px;
            background: rgba(59, 130, 246, 0.05);
            border-left: 4px solid var(--accent-blue);
        }

        .status-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--accent-cyan);
        }

        .status-desc {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* 图例 */
        .legend {
            margin-top: auto;
            font-size: 12px;
            color: var(--text-muted);
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            margin-right: 8px;
        }

        /* 右侧画布区 */
        .canvas-area {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #FFFFFF 0%, #F1F5F9 100%);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>大气环流动力学模型</h1>
        <div class="subtitle">拖动滑块，观察地转偏向力如何介入并“切断”单圈环流，最终重塑出真实的三圈环流系统。</div>

        <div class="control-group">
            <div class="control-header">
                <span class="control-label">地转偏向力强度</span>
                <span class="control-value" id="force-val">0%</span>
            </div>
            <input type="range" id="force-slider" min="0" max="1" step="0.01" value="0">
        </div>

        <div class="status-panel">
            <div class="status-box">
                <div class="status-title" id="mode-title">单圈环流 (理想状态)</div>
                <div class="status-desc" id="mode-desc">
                    在无地转偏向力（地球不自转）的理想假设下，赤道受热上升的空气直达极地冷却下沉，近地面空气从极地直接流回赤道，形成覆盖半球的巨大单圈环流。
                </div>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="legend-color" style="background: #3B82F6;"></div> 哈德仑环流 (低纬)</div>
            <div class="legend-item"><div class="legend-color" style="background: #2563EB;"></div> 费雷尔环流 (中纬)</div>
            <div class="legend-item"><div class="legend-color" style="background: #0284C7;"></div> 极地环流 (高纬)</div>
        </div>
    </div>

    <div class="canvas-area" id="canvas-container">
        <canvas id="sim-canvas"></canvas>
    </div>

    <script>
        // 获取DOM元素
        const canvas = document.getElementById('sim-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const slider = document.getElementById('force-slider');
        const forceValText = document.getElementById('force-val');
        const modeTitle = document.getElementById('mode-title');
        const modeDesc = document.getElementById('mode-desc');

        // 系统参数
        let width, height, cx, cy, R, H;
        let time = 0;
        let forceStrength = 0; // 0 到 1

        // 风场粒子系统
        const particles = [];
        const NUM_PARTICLES = 400;

        // 初始化/重置粒子
        function initParticles() {
            particles.length = 0;
            for (let i = 0; i < NUM_PARTICLES; i++) {
                particles.push({
                    lat: (Math.random() - 0.5) * 170, // -85 到 85度
                    lon: (Math.random() - 0.5) * 170, // -85 到 85度
                    life: Math.random() * 200,
                    maxLife: 150 + Math.random() * 200,
                    history: []
                });
            }
        }

        // 窗口尺寸自适应
        function resize() {
            const container = document.getElementById('canvas-container');
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            
            // 计算地球中心和大小
            cx = width / 2 - 50; // 略微靠左，给右侧截面留空间
            cy = height / 2;
            R = Math.min(width, height) * 0.32; // 地球半径
            H = R * 0.25; // 大气层厚度
        }

        window.addEventListener('resize', resize);

        // 交互监听
        slider.addEventListener('input', (e) => {
            forceStrength = parseFloat(e.target.value);
            forceValText.innerText = Math.round(forceStrength * 100) + '%';
            updateUI();
        });

        function updateUI() {
            if (forceStrength < 0.1) {
                modeTitle.innerText = "单圈环流 (理想状态)";
                modeDesc.innerText = "在无地转偏向力（地球不自转）的理想假设下，赤道受热上升的空气直达极地冷却下沉，近地面空气从极地直接流回赤道，形成覆盖半球的巨大单圈环流。";
                modeTitle.style.color = "#3B82F6";
            } else if (forceStrength < 0.8) {
                modeTitle.innerText = "动力演变 (过渡状态)";
                modeDesc.innerText = "地转偏向力介入。高空流向极地的气流不断向东偏转，最终在纬度30°附近阻滞并下沉，被迫“切断”单圈环流，形成副热带高气压带。";
                modeTitle.style.color = "#2563EB";
            } else {
                modeTitle.innerText = "三圈环流 (实际状态)";
                modeDesc.innerText = "地转偏向力达到现实强度。中纬度下沉气流与极地冷气流在60°相遇抬升形成极锋，演化出完整的低纬、中纬、高纬三个闭合环流圈。";
                modeTitle.style.color = "#0284C7";
            }
        }

        // 辅助绘图函数：绘制大气截面环流圈
        // startLat/endLat 均为弧度
        function drawCellCrossSection(startLat, endLat, isReverse, colorOpacity, cellType) {
            if (Math.abs(endLat - startLat) < 0.02 || colorOpacity < 0.05) return;

            const isNH = startLat <= 0 && endLat <= 0; // 北半球（在Canvas中Y轴向下，纬度<0在上方）
            const aloftCCW = isNH; 
            const surfaceCCW = !isNH;

            ctx.beginPath();
            // 赤道侧地表
            ctx.moveTo(cx + R * Math.cos(startLat), cy + R * Math.sin(startLat));
            // 上升/下降气流
            ctx.lineTo(cx + (R + H) * Math.cos(startLat), cy + (R + H) * Math.sin(startLat));
            // 高空平流
            ctx.arc(cx, cy, R + H, startLat, endLat, aloftCCW);
            // 下降/上升气流
            ctx.lineTo(cx + R * Math.cos(endLat), cy + R * Math.sin(endLat));
            // 地表平流
            ctx.arc(cx, cy, R, endLat, startLat, surfaceCCW);

            ctx.lineWidth = 3;
            
            // 设定颜色
            let colorStr = "59, 130, 246"; // 哈德仑
            if (cellType === 1) colorStr = "37, 99, 235"; // 费雷尔
            if (cellType === 2) colorStr = "2, 132, 199";  // 极地

            ctx.strokeStyle = `rgba(${colorStr}, ${colorOpacity})`;

            // 虚线流动动画
            const dashSpeed = 0.5;
            let offset = (time * dashSpeed) % 40;
            if (isReverse) offset = -offset;

            ctx.setLineDash([12, 10]);
            ctx.lineDashOffset = -offset;
            ctx.stroke();
            ctx.setLineDash([]); // 重置
        }

        // 绘制文字标注
        function drawLabel(text, latDeg, alpha, alignRight = false) {
            if (alpha <= 0.01) return;
            const latRad = -latDeg * Math.PI / 180; // 负号因为Canvas Y轴向下
            const y = cy + R * Math.sin(latRad);
            
            ctx.fillStyle = `rgba(30, 41, 59, ${alpha})`;
            ctx.font = "12px sans-serif";
            ctx.textBaseline = "middle";

            if (alignRight) {
                ctx.textAlign = "left";
                // 右侧标注
                const x = cx + R + H + 20;
                ctx.fillText(text, x, y);
                // 绘制指示线
                ctx.strokeStyle = `rgba(59, 130, 246, ${alpha * 0.4})`;
                ctx.beginPath();
                ctx.moveTo(cx + R, y);
                ctx.lineTo(x - 5, y);
                ctx.stroke();
            } else {
                ctx.textAlign = "right";
                // 左侧标注
                const x = cx - R - 20;
                ctx.fillText(text, x, y);
                // 指示线
                ctx.strokeStyle = `rgba(59, 130, 246, ${alpha * 0.4})`;
                ctx.beginPath();
                ctx.moveTo(cx - R, y);
                ctx.lineTo(x + 5, y);
                ctx.stroke();
            }
        }

        // 核心渲染循环
        function draw() {
            // 背景清理
            ctx.fillStyle = '#F8FAFC';
            ctx.fillRect(0, 0, width, height);

            time += 0.5;

            // 边界计算 (北半球纬度度数)
            // t=0时边界在90度，t=1时分离为30度和60度
            const b1_deg = 90 - 60 * forceStrength; 
            const b2_deg = 90 - 30 * forceStrength;

            // 转化为弧度供右侧截面使用 (负值为北半球)
            const b0_rad = 0;
            const b1_rad_N = -b1_deg * Math.PI / 180;
            const b2_rad_N = -b2_deg * Math.PI / 180;
            const b3_rad_N = -Math.PI / 2;

            const b1_rad_S = b1_deg * Math.PI / 180;
            const b2_rad_S = b2_deg * Math.PI / 180;
            const b3_rad_S = Math.PI / 2;

            // 1. 绘制地球本体和经纬网
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, R, 0, Math.PI * 2);
            ctx.fillStyle = '#EFF6FF';
            ctx.fill();
            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.6)';
            ctx.stroke();

            // 绘制赤道和动态纬线
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.3)';
            ctx.beginPath();
            // 赤道
            ctx.moveTo(cx - R, cy); ctx.lineTo(cx + R, cy);
            // 边界线
            const y_b1_N = cy - R * Math.sin(b1_deg * Math.PI / 180);
            const y_b2_N = cy - R * Math.sin(b2_deg * Math.PI / 180);
            const y_b1_S = cy + R * Math.sin(b1_deg * Math.PI / 180);
            const y_b2_S = cy + R * Math.sin(b2_deg * Math.PI / 180);
            const x_b1 = R * Math.cos(b1_deg * Math.PI / 180);
            const x_b2 = R * Math.cos(b2_deg * Math.PI / 180);
            
            ctx.setLineDash([5, 5]);
            ctx.moveTo(cx - x_b1, y_b1_N); ctx.lineTo(cx + x_b1, y_b1_N);
            ctx.moveTo(cx - x_b2, y_b2_N); ctx.lineTo(cx + x_b2, y_b2_N);
            ctx.moveTo(cx - x_b1, y_b1_S); ctx.lineTo(cx + x_b1, y_b1_S);
            ctx.moveTo(cx - x_b2, y_b2_S); ctx.lineTo(cx + x_b2, y_b2_S);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();

            // 2. 物理演算与绘制球面风场粒子
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, R, 0, Math.PI * 2);
            ctx.clip(); // 限制粒子不出地球边界

            particles.forEach(p => {
                p.life--;
                if (p.life <= 0) {
                    p.lat = (Math.random() - 0.5) * 170;
                    p.lon = (Math.random() - 0.5) * 170;
                    p.life = p.maxLife;
                    p.history = [];
                }

                const absLat = Math.abs(p.lat);
                let vBase = 0; // 基础南北流向（-1向南，1向北）
                
                // 判断粒子处于哪个环流圈
                if (absLat < b1_deg) {
                    vBase = -Math.sign(p.lat); // 哈德仑：流向赤道
                } else if (absLat < b2_deg) {
                    vBase = Math.sign(p.lat);  // 费雷尔：流向极地
                } else {
                    vBase = -Math.sign(p.lat); // 极地：流向赤道
                }

                // 计算地转偏向力偏转角 (最大偏转60度，随纬度正弦变化，随滑块强度变化)
                const deflectAngle = forceStrength * (Math.PI / 3) * Math.sin(p.lat * Math.PI / 180);
                
                // 旋转速度向量得到 U(东西) 和 V(南北) 分量
                const U = vBase * Math.sin(deflectAngle);
                const V = vBase * Math.cos(deflectAngle);

                // 更新经纬度
                const speed = 0.2;
                p.lat += V * speed;
                // 避免高纬度经度收敛除以0
                const cosLat = Math.max(0.05, Math.cos(p.lat * Math.PI / 180));
                p.lon += (U * speed) / cosLat;

                // 边界重置或记录历史
                if (Math.abs(p.lat) > 88 || Math.abs(p.lon) > 85) {
                    p.life = 0; // 越界直接重生
                } else {
                    // 计算屏幕坐标
                    const px = cx + R * Math.cos(p.lat * Math.PI / 180) * Math.sin(p.lon * Math.PI / 180);
                    const py = cy - R * Math.sin(p.lat * Math.PI / 180);
                    
                    p.history.push({x: px, y: py});
                    if (p.history.length > 20) p.history.shift();
                }

                // 绘制粒子轨迹
                if (p.history.length > 1) {
                    // 淡入淡出透明度
                    const alpha = Math.min(1, p.life / 10) * Math.min(1, (p.maxLife - p.life) / 10);
                    
                    ctx.beginPath();
                    ctx.moveTo(p.history[0].x, p.history[0].y);
                    for (let i = 1; i < p.history.length; i++) {
                        ctx.lineTo(p.history[i].x, p.history[i].y);
                    }
                    
                    ctx.strokeStyle = `rgba(59, 130, 246, ${alpha * 0.6})`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
            });
            ctx.restore();

            // 3. 绘制右侧大气环流截面
            // 北半球
            drawCellCrossSection(b0_rad, b1_rad_N, false, 0.9, 0); // 哈德仑
            drawCellCrossSection(b1_rad_N, b2_rad_N, true, forceStrength * 0.9, 1); // 费雷尔 (反向)
            drawCellCrossSection(b2_rad_N, b3_rad_N, false, forceStrength * 0.9, 2); // 极地
            // 南半球
            drawCellCrossSection(b0_rad, b1_rad_S, false, 0.9, 0); 
            drawCellCrossSection(b1_rad_S, b2_rad_S, true, forceStrength * 0.9, 1); 
            drawCellCrossSection(b2_rad_S, b3_rad_S, false, forceStrength * 0.9, 2); 

            // 4. 绘制文字标注
            // 左侧气压带
            drawLabel("赤道低气压带", 0, 1);
            drawLabel("副热带高气压带", b1_deg, forceStrength);
            drawLabel("副热带高气压带", -b1_deg, forceStrength);
            drawLabel("副极地低气压带", b2_deg, forceStrength);
            drawLabel("副极地低气压带", -b2_deg, forceStrength);
            drawLabel("极地高气压带", 90, 1);
            drawLabel("极地高气压带", -90, 1);

            // 右侧风带标注 (根据滑块位置逐渐显现)
            const windAlpha = Math.max(0, (forceStrength - 0.5) * 2);
            if (windAlpha > 0) {
                drawLabel("东北信风带", 15, windAlpha, true);
                drawLabel("东南信风带", -15, windAlpha, true);
                drawLabel("盛行西风带", 45, windAlpha, true);
                drawLabel("盛行西风带", -45, windAlpha, true);
                drawLabel("极地东风带", 75, windAlpha, true);
                drawLabel("极地东风带", -75, windAlpha, true);
            }

            requestAnimationFrame(draw);
        }

        // 启动应用
        resize();
        initParticles();
        updateUI();
        draw();

    </script>
</body>
</html>
