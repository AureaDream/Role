<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>洛克王国分院测试</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <style>
    /* --- 主题色调：暗紫色与金黄色 --- */
    body {
      background-image: linear-gradient(rgba(19, 7, 34, 0.85), rgba(43, 19, 71, 0.85)), url('../../assets/img/roco-background.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 顶部简易导航 */
    .quiz-nav {
      background: rgba(19, 7, 34, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 215, 0, 0.2);
    }

    /* 玻璃拟态卡片容器 */
    .quiz-container {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 215, 0, 0.15);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(255, 215, 0, 0.05);
      padding: 3rem 2rem;
      max-width: 800px;
      margin: 3rem auto;
      transition: all 0.4s ease;
    }

    /* 金色强调文字 */
    .text-gold { color: #FFD700 !important; }
    .text-gold-dim { color: #ccac00 !important; }

    /* 选项按钮样式 */
    .quiz-option {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 215, 0, 0.3);
      color: #e2e8f0;
      border-radius: 12px;
      padding: 1.2rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: flex;
      align-items: center;
    }
    .quiz-option:hover {
      background: rgba(255, 215, 0, 0.15);
      border-color: #FFD700;
      transform: translateX(10px);
      color: #FFD700;
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.2);
    }
    .quiz-option.selected {
      background: #FFD700;
      color: #130722;
      font-weight: bold;
    }

    /* 进度条定制 */
    .progress-custom {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .progress-bar-custom {
      height: 100%;
      background: linear-gradient(90deg, #FFD700, #ffb31a);
      transition: width 0.4s ease;
    }

    /* 结果页专属学院色彩 */
    /* 炼金学 - 湖蓝 */
    .result-A { border-color: #00c0ff !important; box-shadow: 0 0 40px rgba(0, 192, 255, 0.2) !important; }
    .result-A .academy-name { color: #00c0ff; text-shadow: 0 0 15px rgba(0, 192, 255, 0.5); }
    
    /* 精灵学 - 草绿 */
    .result-B { border-color: #7cba3d !important; box-shadow: 0 0 40px rgba(124, 186, 61, 0.2) !important; }
    .result-B .academy-name { color: #7cba3d; text-shadow: 0 0 15px rgba(124, 186, 61, 0.5); }
    
    /* 仪典学 - 紫罗兰 */
    .result-C { border-color: #b050ff !important; box-shadow: 0 0 40px rgba(176, 80, 255, 0.2) !important; }
    .result-C .academy-name { color: #b050ff; text-shadow: 0 0 15px rgba(176, 80, 255, 0.5); }
    
    /* 战斗学 - 土黄 */
    .result-D { border-color: #d4a373 !important; box-shadow: 0 0 40px rgba(212, 163, 115, 0.2) !important; }
    .result-D .academy-name { color: #d4a373; text-shadow: 0 0 15px rgba(212, 163, 115, 0.5); }

    .result-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    /* 动画 */
    .fade-in { animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <nav class="navbar quiz-nav sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand text-gold fw-bold" href="../../index.html">流金梦坊</a>
      <button class="btn btn-link text-decoration-none text-white-50" onclick="window.location.href='hub.html'">
        <i class="bi bi-arrow-left"></i> 离开测试
      </button>
    </div>
  </nav>

  <main class="container flex-grow-1 d-flex flex-column justify-content-center">
    
    <div id="start-screen" class="quiz-container text-center fade-in">
      <i class="bi bi-magic text-gold" style="font-size: 3rem;"></i>
      <h1 class="mt-3 fw-bold text-gold" style="letter-spacing: 2px;">小洛克分院指引</h1>
      <p class="text-white-50 mt-3 mb-5" style="line-height: 1.8; max-width: 600px; margin: 0 auto;">
        娱乐测试，仅供参考！<br>
        目前公测的分院结果除部分剧情表现以外，<br>
        不会影响任何其他游戏体验。
      </p>
      <button onclick="startQuiz()" class="btn btn-warning rounded-pill px-5 py-3 fw-bold fs-5 shadow" style="background: linear-gradient(135deg, #FFD700, #ffb31a); color: #130722; border: none;">
        开始测试
      </button>
    </div>

    <div id="quiz-screen" class="quiz-container d-none">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="text-gold-dim small fw-bold">进度</span>
        <span id="progress-text" class="text-gold-dim small fw-bold">1 / 20</span>
      </div>
      <div class="progress-custom">
        <div id="progress-bar" class="progress-bar-custom" style="width: 5%;"></div>
      </div>

      <h4 id="question-text" class="fw-bold mb-4" style="line-height: 1.6;">题目加载中...</h4>
      
      <div id="options-container">
        </div>
    </div>

    <div id="result-screen" class="quiz-container text-center d-none">
      <div class="result-icon" id="result-icon">🎓</div>
      <h5 class="text-white-50 mb-2">你归属为</h5>
      <h1 id="academy-name" class="academy-name fw-bold mb-4" style="font-size: 3rem; letter-spacing: 4px;">学院名称</h1>
      
      <div class="p-4 rounded-3 text-start" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);">
        <h6 class="text-white-50 border-bottom border-secondary pb-2 mb-3"><i class="bi bi-journal-text me-2"></i>分院评语</h6>
        <p id="academy-desc" class="text-light" style="line-height: 1.8; font-size: 1.05rem;"></p>
      </div>

      <button onclick="location.reload()" class="btn btn-outline-light rounded-pill mt-5 px-4">
        <i class="bi bi-arrow-clockwise me-2"></i>重新测试
      </button>
    </div>

  </main>

  <script>
    // --- 1. 题库数据 ---
    const quizData = [
      { q: "难得的周末早晨，你醒来后的第一件事通常是？", opts: [{t:"A. 整理房间或在脑海里规划今天的日程",v:"A"},{t:"B. 打开窗户呼吸新鲜空气，看看天气",v:"B"},{t:"C. 闭上眼安静地回味昨晚做的梦",v:"C"},{t:"D. 立刻起床洗漱，活动一下身体",v:"D"}] },
      { q: "朋友送了你一个打不开的盲盒，你的本能反应是？", opts: [{t:"A. 找工具试图无损拆解它的外壳",v:"A"},{t:"B. 摇一摇听声音，猜测里面是什么材质",v:"B"},{t:"C. 觉得这是个有意思的摆件，先放在书桌上",v:"C"},{t:"D. 找个着力点，直接用力把它敲开",v:"D"}] },
      { q: "玩探索类游戏时，你最享受哪个环节？", opts: [{t:"A. 收集各种基础材料，合成高级装备",v:"A"},{t:"B. 到处乱逛看风景，发现隐藏的小动物",v:"B"},{t:"C. 仔细阅读物品简介，拼凑世界的背景故事",v:"C"},{t:"D. 直接去挑战地图上难度最高的首领",v:"D"}] },
      { q: "走在路上遇到一只流浪猫，你会怎么做？", opts: [{t:"A. 思考流浪猫增加的社会原因和解决办法",v:"A"},{t:"B. 蹲下来试着喂它，或者轻轻摸摸它",v:"B"},{t:"C. 觉得此时此刻相遇是一种奇妙的缘分",v:"C"},{t:"D. 拿根树枝或绳子逗它，测试它的反应速度",v:"D"}] },
      { q: "你更喜欢哪种类型的阅读材料？", opts: [{t:"A. 逻辑严密的推理小说或科普图鉴",v:"A"},{t:"B. 描写动植物生长或旅行见闻的散文",v:"B"},{t:"C. 充满奇幻色彩和象征意义的神话传说",v:"C"},{t:"D. 节奏紧凑、主角不断变强的热血漫画",v:"D"}] },
      { q: "在陌生的城市迷路时，你的第一反应是？", opts: [{t:"A. 寻找路标、地标建筑或打开地图软件定位",v:"A"},{t:"B. 观察周围植物的生长方向或阳光来判断方位",v:"B"},{t:"C. 不感到焦虑，跟着直觉走一条看起来顺眼的路",v:"C"},{t:"D. 加快脚步，随便选一条大路先走出去再说",v:"D"}] },
      { q: "如果你可以掌握一种特殊能力，你希望是？", opts: [{t:"A. 过目不忘的记忆力和极强的计算能力",v:"A"},{t:"B. 能够听懂所有动物语言的沟通能力",v:"B"},{t:"C. 能够偶尔预知几秒后未来的第六感",v:"C"},{t:"D. 永远不会疲惫且拥有极强自愈力的身体",v:"D"}] },
      { q: "面对一桌丰盛但你从未见过的菜肴，你会？", opts: [{t:"A. 先分析食材构成和烹饪方法再动筷子",v:"A"},{t:"B. 先尝尝那些看起来保留了自然原味的素菜",v:"B"},{t:"C. 挑选摆盘最有艺术感、造型最奇特的那一道",v:"C"},{t:"D. 选肉最多或者看起来最能迅速填饱肚子的",v:"D"}] },
      { q: "你认为最让人感到踏实的场景是？", opts: [{t:"A. 抽屉里的所有物品都按分类摆放得整整齐齐",v:"A"},{t:"B. 阳光正好洒在满是绿植和鲜花的阳台上",v:"B"},{t:"C. 在绝对安静的夜晚独自仰望星空",v:"C"},{t:"D. 身边放着可以随时用来防身或锻炼的器具",v:"D"}] },
      { q: "朋友之间发生激烈争执，你通常的介入方式是？", opts: [{t:"A. 理性分析双方对错，提出公平的解决方案",v:"A"},{t:"B. 安慰双方情绪，试图让大家互相理解并和解",v:"B"},{t:"C. 默默倾听，相信时间会给出答案，不急于干预",v:"C"},{t:"D. 直接大声喊停制止争吵，把大家拉去打球或吃饭",v:"D"}] },
      { q: "看到一场美丽的日落，你脑海中闪过的念头是？", opts: [{t:"A. 这是大气散射导致的天文物理现象",v:"A"},{t:"B. 飞鸟归巢，万物即将进入休息的时刻",v:"B"},{t:"C. 宇宙极其浩瀚，人类的存在充满神秘感",v:"C"},{t:"D. 趁着天还没完全黑，再去跑两圈出出汗",v:"D"}] },
      { q: "你买日用品时更看重什么？", opts: [{t:"A. 极致的实用性和功能设计的合理性",v:"A"},{t:"B. 材质是否环保天然，是否对环境友好",v:"B"},{t:"C. 物品背后有没有特殊的寓意或设计理念",v:"C"},{t:"D. 质量必须过硬，结实耐用不容易坏",v:"D"}] },
      { q: "遇到一个极其困难的智力谜题，你会？", opts: [{t:"A. 寻找底层规律，逐步推导正确答案",v:"A"},{t:"B. 叫上朋友一起讨论，在交流中寻找灵感",v:"B"},{t:"C. 暂时放下，等待直觉和灵光一闪的瞬间",v:"C"},{t:"D. 不断试错，把所有可能的组合都强行试一遍",v:"D"}] },
      { q: "收到一束鲜花，你会怎么处理？", opts: [{t:"A. 找个合适的瓶子装起来，并按比例加入保鲜剂",v:"A"},{t:"B. 仔细观察花瓣的自然纹理，闻它的香气",v:"B"},{t:"C. 把花瓣夹在重要的书里，做成干花当做纪念",v:"C"},{t:"D. 随手放在桌子上，不去多管它的死活",v:"D"}] },
      { q: "在一个团队中，你最不欣赏哪种人？", opts: [{t:"A. 缺乏逻辑，做事毫无条理和计划的人",v:"A"},{t:"B. 破坏环境，完全不尊重他人感受的人",v:"B"},{t:"C. 缺乏想象力，只看重眼前世俗利益的人",v:"C"},{t:"D. 遇到一点困难就退缩，毫无斗志的人",v:"D"}] },
      { q: "你对四个季节的偏好更倾向于？", opts: [{t:"A. 秋天，因为可以收获各种果实、材料和资源",v:"A"},{t:"B. 春天，万物复苏，一切都充满了生命力",v:"B"},{t:"C. 冬天，白雪皑皑，世界变得纯粹、神秘且安静",v:"C"},{t:"D. 夏天，充满活力，可以尽情去户外挥洒汗水",v:"D"}] },
      { q: "你的理想房间布置风格更偏向？", opts: [{t:"A. 功能分区极其明确，有大量的工具墙和收纳盒",v:"A"},{t:"B. 拥有巨大的落地窗，有很多绿植和自然元素",v:"B"},{t:"C. 光线昏暗但有星空灯，挂着充满神秘感的画作",v:"C"},{t:"D. 简单宽敞，没有任何多余家具，方便在室内活动",v:"D"}] },
      { q: "如果要参加一个周末兴趣班，你会选择？", opts: [{t:"A. 实用手工制作、机械修理或化学实验课",v:"A"},{t:"B. 户外生态摄影、动物救助或园艺栽培课",v:"B"},{t:"C. 古典占星术、塔罗牌或古代神话研究课",v:"C"},{t:"D. 散打、剑击、跑酷或其他高强度的极限运动课",v:"D"}] },
      { q: "面对未知的全新挑战，你的真实心态是？", opts: [{t:"A. 立刻开始收集情报，做好充足的准备和预案",v:"A"},{t:"B. 保持极大的好奇心，期待遇到不一样的新事物",v:"B"},{t:"C. 相信这是命运注定的考验，保持敬畏顺其自然",v:"C"},{t:"D. 感到肾上腺素飙升，迫不及待想要正面战胜它",v:"D"}] },
      { q: "你希望你的朋友们如何评价你？", opts: [{t:"A. 极其聪明，能解决各种实际难题的智囊",v:"A"},{t:"B. 温柔善良，相处起来让人感觉如沐春风",v:"B"},{t:"C. 思想深邃，总能看透事物本质的精神导师",v:"C"},{t:"D. 勇敢坚强，关键时刻绝对靠得住的行动派",v:"D"}] }
    ];

    // --- 2. 学院数据映射 ---
    const academyMap = {
      'A': {
        name: '炼金学',
        colorClass: 'result-A',
        iconPath: '../../assets/img/alchemy.png', // 替换为炼金学图标路径
        desc: '你的信息获取与决策偏向于【思考与判断】。<br>你重视逻辑、实用主义、规则拆解与物质转化。面对世界，你习惯于剥丝抽茧寻找底层规律。你就像一位严谨的炼金术士，擅长点石成金，能够完美地利用自然原料组合成强大的器具与力量。'
      },
      'B': {
        name: '精灵学',
        colorClass: 'result-B',
        iconPath: '../../assets/img/elf.png', // 替换为精灵学图标路径
        desc: '你的信息获取与决策偏向于【情感与感知】。<br>你拥有极强的共情能力，关注自然生态，渴望与外界的生命体保持和谐共处。你不会用冰冷的工具去征服自然，而是用温暖的心灵去沟通。探索大自然与生态原理，是你灵魂的本能。'
      },
      'C': {
        name: '仪典学',
        colorClass: 'result-C',
        iconPath: '../../assets/img/ritual.png', // 替换为仪典学图标路径
        desc: '你的能量运行偏向于【内倾直觉】。<br>你具有神秘主义特质与极高的精神追求，喜欢寻找事物表面背后的深层意义。现实的繁杂无法束缚你的灵魂，你更习惯于仰望星空、探索命运的指引与灵体的低语。敬畏与顺应，是你强大的源泉。'
      },
      'D': {
        name: '战斗学',
        colorClass: 'result-D',
        iconPath: '../../assets/img/combat.png', // 替换为战斗学图标路径
        desc: '你的能量运行偏向于【外倾感觉】。<br>你活在当下，行动力极强，偏好感官的刺激与直接的物理干预。面对未知与挑战，你不会优柔寡断，而是选择正面突破。深耕对战技巧、用纯粹的力量去征服，这就是独属于你的行动派浪漫。'
      }
    };
    // --- 3. 全局状态 ---
    let currentIndex = 0;
    let scores = { A: 0, B: 0, C: 0, D: 0 };

    // --- 4. 逻辑控制 ---
    function startQuiz() {
      document.getElementById('start-screen').classList.add('d-none');
      document.getElementById('quiz-screen').classList.remove('d-none');
      renderQuestion();
    }

    function renderQuestion() {
      const qData = quizData[currentIndex];
      document.getElementById('question-text').innerText = `${currentIndex + 1}. ${qData.q}`;
      
      // 更新进度条
      const percent = ((currentIndex) / quizData.length) * 100;
      document.getElementById('progress-bar').style.width = `${percent}%`;
      document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${quizData.length}`;

      // 渲染选项
      const container = document.getElementById('options-container');
      container.innerHTML = '';
      
      qData.opts.forEach(opt => {
        const div = document.createElement('div');
        div.className = 'quiz-option fade-in';
        div.innerHTML = `<span>${opt.t}</span>`;
        div.onclick = () => selectOption(opt.v, div);
        container.appendChild(div);
      });
    }

    function selectOption(value, element) {
      // 视觉反馈
      const options = document.querySelectorAll('.quiz-option');
      options.forEach(opt => opt.style.pointerEvents = 'none'); // 防止连点
      element.classList.add('selected');

      // 记分
      scores[value]++;

      // 延迟切换下一题
      setTimeout(() => {
        currentIndex++;
        if (currentIndex < quizData.length) {
          renderQuestion();
        } else {
          showResult();
        }
      }, 400);
    }

    function showResult() {
      document.getElementById('quiz-screen').classList.add('d-none');
      
      // 1. 计算最高分
      let maxScore = -1;
      let finalResult = 'A';
      for (const [key, value] of Object.entries(scores)) {
        if (value > maxScore) {
          maxScore = value;
          finalResult = key;
        }
      }

      // 2. 必须先声明并获取当前学院的数据
      const resultData = academyMap[finalResult];
      const resultScreen = document.getElementById('result-screen');
      
      // 3. 之后才能使用 resultData 里的属性来渲染页面
      resultScreen.classList.add(resultData.colorClass);
      
      // 插入你本地文件夹中的图片图标
      document.getElementById('result-icon').innerHTML = `<img src="${resultData.iconPath}" alt="${resultData.name}图标" style="width: 100px; height: 100px; object-fit: contain;">`;
      
      document.getElementById('academy-name').innerText = resultData.name;
      document.getElementById('academy-desc').innerHTML = resultData.desc;

      // 4. 显示结果页
      resultScreen.classList.remove('d-none');
      resultScreen.classList.add('fade-in');
    }
  </script>
