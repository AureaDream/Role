<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>织梦所 · 流金梦坊</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/theme.css">
</head>
<body data-page="workshop">
  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="../index.html">流金梦坊</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html">大厅</a></li>
          <li class="nav-item"><a class="nav-link active" href="workshop.html">织梦所</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">卧室</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="flowing-gold-line"></div>

  <main class="container my-4">
    <ul class="nav nav-pills mb-3" id="pills" role="tablist">
      <li class="nav-item" role="presentation"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#create" type="button" role="tab">创建OC</button></li>
      <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#story" type="button" role="tab">故事生成器</button></li>
    </ul>
    <div class="tab-content">
      <div class="tab-pane fade show active" id="create" role="tabpanel">
        <div class="accordion" id="ocAccordion">
          <!-- 基础信息 -->
          <div class="accordion-item border-0 mb-3 shadow-sm rounded-3">
            <h2 class="accordion-header">
              <button class="accordion-button fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true">
                1. 基础信息
              </button>
            </h2>
            <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#ocAccordion">
              <div class="accordion-body">
                <!-- 头像上传区域 -->
                <div class="text-center mb-4">
                  <div class="position-relative d-inline-block" style="cursor: pointer;" onclick="document.getElementById('charAvatarInput').click()">
                    <img id="charAvatarPreview" src="https://placehold.co/200?text=Upload" class="rounded-circle border shadow-sm" style="width: 120px; height: 120px; object-fit: cover;">
                    <input type="file" id="charAvatarInput" class="d-none" accept="image/*">
                    <div class="position-absolute bottom-0 end-0 bg-white rounded-circle border shadow-sm d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
                      <span>📷</span>
                    </div>
                  </div>
                  <div class="text-muted small mt-2">点击上传立绘</div>
                  <div class="form-check form-switch d-inline-block mt-2">
                    <input class="form-check-input" type="checkbox" id="watermarkCheck">
                    <label class="form-check-label small text-muted" for="watermarkCheck">添加个人水印</label>
                  </div>
                </div>

                <div class="row g-3">
                  <div class="col-sm-6"><label class="form-label text-muted">姓名</label><input id="charName" class="form-control" placeholder="请输入姓名"></div>
                  <div class="col-sm-6"><label class="form-label text-muted">性别</label><select id="charGender" class="form-select"><option>男</option><option>女</option><option>其他</option></select></div>
                  <div class="col-sm-6"><label class="form-label text-muted">年龄</label><input id="charAge" class="form-control" type="number" placeholder="年龄"></div>
                  <div class="col-sm-6"><label class="form-label text-muted">种族</label><input id="charRace" class="form-control" placeholder="例如 人类/猫耳族"></div>
                  <div class="col-sm-6"><label class="form-label text-muted">职业</label><input id="charJob" class="form-control" placeholder="例如 游侠/诗人"></div>
                  <div class="col-sm-12"><label class="form-label text-muted">性格</label><input id="charPersonality" class="form-control" placeholder="例如 傲娇/腹黑/温柔"></div>
                </div>
              </div>
            </div>
          </div>
          <!-- 深度设定 -->
          <div class="accordion-item border-0 mb-3 shadow-sm rounded-3">
            <h2 class="accordion-header">
              <button class="accordion-button collapsed fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo">
                2. 深度设定
              </button>
            </h2>
            <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#ocAccordion">
              <div class="accordion-body">
                <div class="row g-3">
                   <div class="col-12"><label class="form-label text-muted">外貌描写</label><textarea id="charAppearance" class="form-control" rows="3" placeholder="输入外貌特征"></textarea></div>
                   <div class="col-12">
                     <label class="form-label text-muted">背景故事</label>
                     <textarea id="charBio" class="form-control" rows="3" placeholder="输入背景故事" data-bs-toggle="modal" data-bs-target="#focusModal"></textarea>
                   </div>
                </div>
              </div>
            </div>
          </div>
          <!-- 标签系统 -->
          <div class="accordion-item border-0 mb-3 shadow-sm rounded-3">
            <h2 class="accordion-header">
              <button class="accordion-button collapsed fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#collapseThree">
                3. 标签系统
              </button>
            </h2>
            <div id="collapseThree" class="accordion-collapse collapse" data-bs-parent="#ocAccordion">
              <div class="accordion-body">
                <div class="row g-2 align-items-end">
                  <div class="col-auto"><label class="form-label text-muted">标签键</label><input id="tagKey" class="form-control" placeholder="MBTI"></div>
                  <div class="col-auto"><label class="form-label text-muted">标签值</label><input id="tagVal" class="form-control" placeholder="INFJ"></div>
                  <div class="col-auto"><button id="addTagBtn" class="btn btn-primary">添加</button></div>
                </div>
                <div id="tagList" class="caps mt-3"></div>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Mobile FAB -->
        <div class="fab-container d-flex align-items-center gap-2">
           <button id="saveCharBtn" class="btn btn-primary rounded-pill px-4 shadow-lg">保存设定</button>
           <button id="aiPolishBtn" class="btn btn-warning rounded-pill px-4 shadow-lg text-white">AI 润色</button>
           <button type="button" class="btn btn-outline-info rounded-circle shadow-lg d-flex align-items-center justify-content-center" style="width:40px;height:40px;padding:0;" onclick="showAlert('【AI润色功能会基于你给定的外貌描述与背景故事内容，输出一份更完整的故事。<br>注意：此内容完全由AI生成，不具备原创效益。】')">
             <i class="bi bi-question-lg"></i>
           </button>
        </div>
        
        <!-- Desktop Actions (Hidden on mobile via CSS if needed, but keeping for now as secondary) -->
        <div class="d-none d-md-flex gap-2 justify-content-end mt-4">
           <button id="diceBtn" class="btn btn-outline-primary">🎲 随机骰子</button>
           <button id="previewCardBtn" class="btn btn-outline-secondary">预览卡片</button>
        </div>
      </div>

      <div class="tab-pane fade" id="story" role="tabpanel">
        <div class="card">
          <div class="card-body">
            <div class="row g-3">
              <!-- 侧重控制栏 (新增) -->
              <div class="col-12 border-bottom pb-3 mb-2">
                 <div class="row g-2">
                   <div class="col-sm-6">
                     <label class="form-label small text-muted">文风倾向</label>
                     <input id="storyTone" class="form-control form-control-sm" placeholder="例如 唯美/暗黑/治愈">
                   </div>
                   <div class="col-sm-6">
                     <label class="form-label small text-muted">时代背景</label>
                     <input id="storyPeriod" class="form-control form-control-sm" placeholder="故事发生在什么时期？">
                   </div>
                 </div>
              </div>

              <div class="col-sm-6"><label class="form-label">主角A</label><select id="selectA" class="form-select"></select></div>
              <div class="col-sm-6"><label class="form-label">配角B</label><select id="selectB" class="form-select"><option value="">【无】</option></select></div>
              <div class="col-12"><label class="form-label">关键词</label><input id="keywords" class="form-control" placeholder="例如 雨夜, 失恋"></div>
            </div>
            <button id="genBtn" class="btn btn-primary mt-3 w-100 py-2">✨开始织梦</button>
            
            <div id="loadingArea" class="text-center my-5 d-none">
               <div class="loading-halo"></div>
               <div class="text-muted mt-2 small">AI正在编织梦境...</div>
            </div>

            <!-- 灵感共创区 (新增) -->
            <div id="inspirationArea" class="mt-4 d-none">
                <div class="text-center mb-3">
                    <div class="h6 text-muted">请选择一个梦境走向...</div>
                </div>
                <div id="optionList" class="d-grid gap-2">
                    <!-- 动态插入选项按钮 -->
                </div>
                
                <!-- 自定义走向卡片 (Feature 1) -->
                <div class="card mt-3 border-secondary border-opacity-25 bg-light">
                  <div class="card-body p-3">
                    <label class="form-label small text-muted mb-1"><i class="bi bi-pencil-square me-1"></i>自定义走向</label>
                    <textarea id="customPathInput" class="form-control mb-2" rows="2" placeholder="或者，由你来决定命运的轨迹..."></textarea>
                    <button id="useCustomPathBtn" class="btn btn-sm btn-outline-dark w-100">使用此走向</button>
                  </div>
                </div>

                <button id="confirmPathBtn" class="btn btn-primary w-100 mt-3" disabled>
                    <i class="bi bi-check-circle me-1"></i> 确认编织
                </button>
            </div>
            
            <div id="resultCard" class="parchment-box mt-4 d-none">
              <div class="h5 fw-bold mb-3" style="color:#b39700">❖ 梦境篇章</div>
              <div id="resultPre" class="fade-in-text" style="white-space:pre-wrap; line-height:1.8;"></div>
              
              <!-- 交互气泡容器 (Feature 3) -->
              <div id="interactionZone" class="mt-4 p-3 bg-white rounded shadow-sm border border-warning d-none" style="border-left: 4px solid #FFC107 !important;">
                 <div class="d-flex align-items-center mb-2 text-warning">
                   <i class="bi bi-stars me-2"></i>
                   <span class="fw-bold small">命运的分岔路口</span>
                 </div>
                 <p class="mb-2 small text-muted">面对这个局面，如果是你，你会怎么做？</p>
                 <textarea id="userReaction" class="form-control mb-2" rows="2" placeholder="描述角色的反应或决定..."></textarea>
                 <button id="continueStoryBtn" class="btn btn-warning w-100 text-dark fw-bold">
                   <i class="bi bi-play-circle me-1"></i> 继续编织
                 </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="focusModal" tabindex="-1">
    <div class="modal-dialog modal-fullscreen">
      <div class="modal-content">
        <div class="modal-header border-0"><h5 class="modal-title fw-bold">沉浸编辑</h5><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button></div>
        <div class="modal-body"><textarea id="focusBioInput" class="form-control border-0 h-100 fs-5" style="background:transparent; resize:none;" placeholder="在此专注编辑背景故事..."></textarea></div>
        <div class="modal-footer border-0"><button type="button" id="focusSaveBtn" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">完成</button></div>
      </div>
    </div>
  </div>

  <!-- 裁剪图片弹窗 -->
  <div class="modal fade" id="cropModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">裁剪头像</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-0" style="max-height: 70vh; background-color: #333;">
          <div class="d-flex justify-content-center align-items-center h-100">
             <img id="cropImage" src="" style="max-width: 100%; max-height: 60vh; display: block;">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" id="cropConfirmBtn">确认裁剪</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
